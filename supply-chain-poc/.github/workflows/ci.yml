name: Supply Chain POC CI

on:
  push:
    paths:
      - "supply-chain-poc/**"
  pull_request:
    paths:
      - "supply-chain-poc/**"

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supply-chain-poc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            supply-chain-poc/package-lock.json
            supply-chain-poc/backend/package-lock.json
            supply-chain-poc/frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint
        run: npm run lint

      - name: Test backend
        run: npm run test

      - name: Build frontend
        run: npm run build
