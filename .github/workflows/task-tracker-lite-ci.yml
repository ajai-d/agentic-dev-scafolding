name: Task Tracker Lite CI

on:
  push:
    paths:
      - "task-tracker-lite/**"
      - ".github/workflows/task-tracker-lite-ci.yml"
  pull_request:
    paths:
      - "task-tracker-lite/**"
      - ".github/workflows/task-tracker-lite-ci.yml"

jobs:
  quality-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-tracker-lite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: task-tracker-lite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Initialize database
        run: npm run init-db

      - name: Run quality checks
        run: npm run quality:check
