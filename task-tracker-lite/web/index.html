<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Tracker Lite</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Task Tracker Lite</h1>
      <p class="status" id="api-status">Checking API status...</p>

      <section class="panel">
        <h2>Create Task</h2>
        <form id="task-form" class="task-form">
          <label>
            Title
            <input id="title-input" name="title" type="text" maxlength="120" required />
          </label>

          <label>
            Description
            <textarea id="description-input" name="description" maxlength="500"></textarea>
          </label>

          <label>
            Priority
            <select id="priority-input" name="priority" required>
              <option value="low">low</option>
              <option value="medium" selected>medium</option>
              <option value="high">high</option>
            </select>
          </label>

          <label>
            Due Date
            <input id="due-date-input" name="dueDate" type="date" />
          </label>

          <button id="create-task-btn" type="submit">Create Task</button>
        </form>
      </section>

      <section class="panel">
        <h2>Tasks</h2>
        <ul id="task-list" class="task-list"></ul>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
